# AWS App Runner — managed Python 3.11 does NOT include the Codex CLI (no Node/npm).
# This app requires `codex` on PATH. Prefer deploying the Dockerfile in this repo, or install
# Node + `npm install -g @openai/codex` in a custom build image.
#
# Console mirror (Configuration source: API):
#   Build:  pip3 install -r requirements.txt
#   Start:  sh start.sh
#
# `start.sh` re-runs pip at runtime (recommended for Python 3.11 revised build).

version: 1.0
runtime: python311

build:
  commands:
    build:
      - python3 -m pip install --upgrade pip setuptools wheel
      - pip3 install --no-cache-dir -r requirements.txt

run:
  runtime-version: "3.11"
  command: sh start.sh
  network:
    port: 8080
