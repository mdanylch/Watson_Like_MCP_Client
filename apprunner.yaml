# AWS App Runner — source repo config (Python 3.11 managed runtime).
# https://docs.aws.amazon.com/apprunner/latest/dg/service-source-code-python.html
#
# Python 3.11 uses the "revised" build: use pip3 / python3 (plain `pip` is not on PATH).
#
# Console mirror (Configuration source: API), matching webex-cc-mcp:
#   Build:  pip3 install -r requirements.txt
#   Start:  sh start.sh
#
# `start.sh` re-runs pip at runtime (recommended for Python 3.11 revised build).

version: 1.0
runtime: python311

build:
  commands:
    build:
      - python3 -m pip install --upgrade pip setuptools wheel
      - pip3 install --no-cache-dir -r requirements.txt

run:
  runtime-version: "3.11"
  command: sh start.sh
  network:
    port: 8080
